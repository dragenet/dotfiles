# ~/.config/tmux/tmux.conf (symlinked from dotfiles/tmux/tmux.conf)

# ─── General behaviour ───────────────────────────────────────────────────────
set -g mouse on              # click to select panes/windows, drag to resize, scroll to scroll
set -sg escape-time 0        # don't wait after Esc — needed for snappy Neovim mode switching
set -g base-index 1          # windows numbered from 1 (not 0, easier to reach on keyboard)
setw -g pane-base-index 1    # panes numbered from 1 too
set -g renumber-windows on   # closing window 2 of 3 shifts window 3 down to 2

# ─── True color ───────────────────────────────────────────────────────────────
# Tells tmux (and apps inside it, like Neovim) that the terminal supports
# 24-bit RGB color — without this, colorschemes look washed out.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# ─── Copy mode ──────────────────────────────────────────────────────────────
setw -g mode-keys vi         # use vi-style keys (hjkl, v to select, y to yank) in copy mode

# ─── Status bar ───────────────────────────────────────────────────────────────
# Minimal, lualine-style bar at the TOP — the default bottom bar fights with
# Neovim's own lualine for the same screen line. Colours match kanagawa-wave
# (the nvim colorscheme): sumiInk1 background, crystalBlue accent for the
# session name, fujiWhite for the active window.
set -g status-position top
set -g status-style "bg=#181820,fg=#727169"
set -g status-left-length 20
set -g status-left "#[bg=#7E9CD8,fg=#181820,bold] #S "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#DCD7BA,bold] #I:#W "
set -g status-right ""

# ─── Pane splits ──────────────────────────────────────────────────────────────
# More mnemonic than the defaults (% and "): | looks like a vertical divider,
# - like a horizontal one. Also open the new pane in the current pane's
# working directory instead of the session's original directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Even-out pane sizes ────────────────────────────────────────────────────
# Repeated | splits give 50/25/25 instead of equal thirds. Rebalance on demand:
# even-horizontal = equal-width columns (for | splits), even-vertical = equal-
# height rows (for - splits). Mnemonic: = means "make equal".
# Overrides the default `=` binding (choose-buffer, rarely used).
bind = select-layout even-horizontal
bind + select-layout even-vertical

# ─── New windows ──────────────────────────────────────────────────────────────
# Open new windows (prefix + c) in the current pane's working directory
# instead of the session's original directory. prefix + C (shift) keeps the
# old default behaviour: open in the session's original directory.
bind c new-window -c "#{pane_current_path}"
bind C new-window

# ─── Window switching (Ctrl-Alt-hjkl) ─────────────────────────────────────────
# Ctrl-h/l are taken by smart-splits for pane navigation, so windows use
# Ctrl-Alt-h/l instead. Unlike Ctrl-Shift (which needs the terminal to send
# special "extended key" escape sequences that Ghostty+tmux don't reliably
# agree on), Ctrl-Alt just adds a plain ESC prefix — works everywhere with no
# extra config.
bind-key -n C-M-h previous-window
bind-key -n C-M-l next-window

# ─── Smart pane navigation with Neovim (smart-splits.nvim) ───────────────────
# Ctrl-hjkl moves between tmux panes, but if the active pane is running Neovim,
# the keypress is forwarded to Neovim instead — so Ctrl-hjkl seamlessly moves
# between tmux panes AND Neovim splits as if they were one grid.
# The "@pane-is-vim" variable is set by smart-splits.nvim when it starts.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'

# Same idea for resizing with Alt-hjkl
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# ─── Plugins (managed by TPM — prefix + I to install/update) ─────────────────
set -g @plugin 'tmux-plugins/tpm'

# tmux-yank: 'y' in copy-mode copies to the system clipboard (via OSC52 over
# SSH too, so it reaches your local clipboard even from a remote session)
set -g @plugin 'tmux-plugins/tmux-yank'

# tmux-resurrect + tmux-continuum: save/restore tmux sessions (windows, panes,
# working directories) across reboots/disconnects — continuum auto-saves
# every 15 min and can auto-restore on tmux start.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TPM (must be the last line in the config)
run '~/.tmux/plugins/tpm/tpm'
